<div class="card shadow-sm border-0">
  <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
    <h5 class="mb-0 text-primary fw-bold">Clients List</h5>
    <div class="d-flex gap-2">
      <input type="text" [(ngModel)]="searchKeyword" (keyup)="handleSearch()" 
             class="form-control form-control-sm border-0 bg-light" placeholder="Search...">
      <button class="btn btn-primary btn-sm px-3" routerLink="/new-client">
        Add Client
      </button>
    </div>
  </div>
  <div class="card-body">
    <div *ngIf="errorMessage" class="alert alert-danger">
      {{errorMessage}}
    </div>
    <div class="table-responsive">
      <table class="table table-hover align-middle" *ngIf="filteredClients.length > 0">
        <thead class="table-light text-secondary">
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let c of filteredClients">
            <td>{{c.id}}</td>
            <td class="fw-medium">{{c.nom}}</td>
            <td class="text-muted">{{c.email}}</td>
            <td class="text-end">
              <button (click)="handleViewContracts(c)" class="btn btn-sm btn-light border">
                View Contracts
              </button>
            </td>
          </tr>
        </tbody>
      </table>
      <div *ngIf="filteredClients.length == 0" class="text-center py-5">
        <p class="text-muted mb-0">No clients found matching your search.</p>
      </div>
    </div>
  </div>
</div>
