<div class="row">
  <div class="col-md-8">
    <div class="card shadow-sm border-0">
      <div class="card-header bg-white py-3">
        <h5 class="mb-0 text-primary fw-bold">Payments History (Contract #{{contractId}})</h5>
      </div>
      <div class="card-body">
        <div *ngIf="errorMessage" class="alert alert-danger">{{errorMessage}}</div>
        <div class="table-responsive">
          <table class="table table-hover align-middle" *ngIf="payments.length > 0">
            <thead class="table-light text-secondary">
              <tr>
                <th>Date</th>
                <th>Type</th>
                <th>Amount</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let p of payments">
                <td>{{p.date | date:'dd/MM/yyyy'}}</td>
                <td><span class="badge bg-light text-dark border">{{p.type}}</span></td>
                <td class="fw-bold">{{p.amount | number:'1.2-2'}} DH</td>
              </tr>
            </tbody>
          </table>
          <div *ngIf="payments.length == 0" class="text-center py-5">
            <p class="text-muted">No payments found for this contract.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card shadow-sm border-0">
      <div class="card-header bg-white py-3">
        <h5 class="mb-0 text-success fw-bold">Add Payment</h5>
      </div>
      <div class="card-body">
        <form [formGroup]="paymentFormGroup" (ngSubmit)="handleSavePayment()">
          <div class="mb-3">
            <label class="form-label small fw-bold text-secondary">Amount (DH)</label>
            <input type="number" formControlName="amount" class="form-control bg-light border-0">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold text-secondary">Type</label>
            <select formControlName="type" class="form-select bg-light border-0">
              <option value="MENSUALITE">Mensualité</option>
              <option value="PAIEMENT_ANNUEL">Paiement Annuel</option>
              <option value="PAIEMENT_EXCEPTIONNEL">Paiement Exceptionnel</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold text-secondary">Date</label>
            <input type="date" formControlName="date" class="form-control bg-light border-0">
          </div>
          <div class="d-grid mt-4">
            <button [disabled]="!paymentFormGroup.valid" class="btn btn-success fw-medium">Record Payment</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
